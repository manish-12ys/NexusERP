{% extends "base.html" %}

{% block title %}AI Operations Copilot{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto h-[calc(100vh-12rem)] flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
    <!-- Header -->
    <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 flex items-center justify-between">
        <div>
            <h2 class="text-lg font-semibold text-slate-800">AI Operations Copilot</h2>
            <p class="text-sm text-slate-500">Ask questions about inventory, production, and orders.</p>
        </div>
        <div class="h-10 w-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
    </div>

    <!-- Chat Area -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
        <!-- Welcome Message -->
        <div class="flex gap-4">
            <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold flex-shrink-0">
                AI
            </div>
            <div class="bg-white p-4 rounded-lg rounded-tl-none shadow-sm border border-slate-200 max-w-[80%]">
                <p class="text-slate-700">Hello! I'm your NexusERP Copilot. I have access to your live data. What would you like to know?</p>
                <div class="mt-3 flex flex-wrap gap-2">
                    <button onclick="fillMessage('Which products are running low?')" class="text-xs bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full hover:bg-indigo-100 transition-colors">Which products are running low?</button>
                    <button onclick="fillMessage('What should I manufacture today?')" class="text-xs bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full hover:bg-indigo-100 transition-colors">What should I manufacture today?</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-4 bg-white border-t border-slate-200">
        <form id="chat-form" class="flex gap-2" onsubmit="sendMessage(event)">
            <input type="text" id="chat-input" class="flex-1 rounded-lg border-slate-300 focus:border-indigo-500 focus:ring-indigo-500" placeholder="Type your question..." required>
            <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-colors flex items-center gap-2">
                <span>Send</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const chatInput = document.getElementById('chat-input');

    function fillMessage(text) {
        chatInput.value = text;
        chatInput.focus();
    }

    function appendMessage(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `flex gap-4 ${isUser ? 'flex-row-reverse' : ''}`;
        
        const avatar = isUser 
            ? `<div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-white font-bold flex-shrink-0">U</div>`
            : `<div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold flex-shrink-0">AI</div>`;
            
        const bubbleColor = isUser ? 'bg-slate-800 text-white' : 'bg-white text-slate-700 border border-slate-200';
        const borderRadius = isUser ? 'rounded-tr-none' : 'rounded-tl-none';
        
        // simple markdown formatting (bold, newlines)
        const formattedText = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        div.innerHTML = `
            ${avatar}
            <div class="${bubbleColor} p-4 rounded-lg ${borderRadius} shadow-sm max-w-[80%]">
                <p class="text-sm">${formattedText}</p>
            </div>
        `;
        
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage(e) {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (!message) return;

        // Add user message
        appendMessage(message, true);
        chatInput.value = '';
        chatInput.disabled = true;

        // Add loading state
        const loadingId = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = loadingId;
        loadingDiv.className = `flex gap-4`;
        loadingDiv.innerHTML = `
            <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold flex-shrink-0">AI</div>
            <div class="bg-white p-4 rounded-lg rounded-tl-none shadow-sm border border-slate-200">
                <div class="flex space-x-2 h-5 items-center">
                    <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                </div>
            </div>
        `;
        chatContainer.appendChild(loadingDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            const response = await fetch('/copilot/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await response.json();
            
            // Remove loading state
            document.getElementById(loadingId).remove();
            
            // Add AI response
            appendMessage(data.response);
        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage('Sorry, an error occurred while connecting to the AI.');
        } finally {
            chatInput.disabled = false;
            chatInput.focus();
        }
    }
</script>
{% endblock %}
